name: Daily Scraper

on:
  schedule:
    # Run every morning at 6:00 AM UTC (2:00 AM EST)
    - cron: '0 6 * * *'
  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml

      - name: Run scraper script
        run: python scrape_leaderboard.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add final_scoreboard.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Automate daily scoreboard update" && git push)
